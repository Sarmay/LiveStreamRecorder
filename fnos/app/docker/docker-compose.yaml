services:
  backend:
    image: ghcr.io/sarmay/livestreamrecorder-backend:1.0.1
    container_name: fnos-livestreamrecorder-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - /var/apps/App.Docker.LiveStreamRecorder/shares/App.Docker.LiveStreamRecorder/recordings:/app/recordings

  frontend:
    image: ghcr.io/sarmay/livestreamrecorder-frontend:1.0.1
    container_name: fnos-livestreamrecorder-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "38088:80"
