services:
  backend:
    build:
      context: ./backend
    ports:
      - "3009:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./recordings:/app/recordings
    environment:
      - NODE_ENV=production
    command: yarn start

  frontend:
    build:
      context: ./frontend
      args:
        VUE_APP_BASE_API: ${VUE_APP_BASE_API:-}
        VUE_APP_WS_API: ${VUE_APP_WS_API:-}
    ports:
      - "8088:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
volumes:
  recordings:
    driver: local
